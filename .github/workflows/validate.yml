name: validate

# Config drift ve prompt çelişkilerini her PR/push'ta yakalar.
# Gerçek üretim yapmaz (higgsfield/kredi gerektirmez) — yalnızca --check + --dry-run.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: jq kur
        run: sudo apt-get update -y && sudo apt-get install -y jq shellcheck

      - name: JSON geçerliliği
        run: |
          for f in missions.json dashboard_assets.json pricing.json presets/*.json; do
            echo "jq empty $f"
            jq empty "$f"
          done

      - name: Bash sözdizimi
        run: |
          for s in *.sh .claude/hooks/*.sh; do bash -n "$s"; done

      - name: Shellcheck
        run: shellcheck -x -e SC1091 *.sh || true   # uyarılar bilgi amaçlı, CI'ı düşürmez

      - name: Python sözdizimi
        run: python3 -m py_compile qc_core.py qc_vision.py

      - name: Preflight (config + ref + mutex çelişki kapısı)
        run: |
          # Ref görseller repoda yoksa --check ref uyarısı verir; mutex/JSON kontrolü
          # yine de koşar. Çelişki/again bozuk config olursa burada düşer.
          ./generate.sh --check 01
          ./generate.sh --check 02

      - name: Dry-run (prompt birleştirme + mutex)
        run: |
          ./generate.sh --dry-run 01 >/dev/null
          ./generate.sh --dry-run 02 >/dev/null
          ./generate_dashboard.sh --dry-run >/dev/null
          ./to_video.sh --dry-run out/latest >/dev/null
